name: Build & Release

# Build the native meshoptimizer wheel on every supported platform, package the
# extension zip, and publish it as a GitHub release. Triggered by pushing a v*
# tag, or manually (a manual run also publishes a release; the tag defaults to
# the manifest version, e.g. v0.1.0, unless overridden).
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (default: v<manifest version>)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  wheels:
    name: wheel (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14        # Apple Silicon
            platform: macos-arm64
          - os: macos-13        # Intel
            platform: macos-x64
          - os: ubuntu-latest
            platform: linux-x64
          - os: windows-latest
            platform: windows-x64
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive   # meshoptimizer source for the build

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Set up MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build native wheel
        run: python native/build_wheel.py

      - name: Run native unit tests
        run: python -m unittest discover -s tests -p "test_*.py" -v

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.platform }}
          path: meshlet_preview/wheels/*.whl
          if-no-files-found: error

  package:
    name: Package extension
    needs: wheels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Collect all platform wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          path: _wheels
          merge-multiple: true

      - name: Assemble extension zip
        run: |
          rm -f meshlet_preview/wheels/*.whl
          cp _wheels/*.whl meshlet_preview/wheels/
          python native/package_extension.py

      - uses: actions/upload-artifact@v4
        with:
          name: meshlet_preview-extension
          path: dist/*.zip
          if-no-files-found: error

      - name: Determine release tag
        id: rel
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            tag="${{ github.event.inputs.tag }}"
            if [ -z "$tag" ]; then
              ver=$(grep -E '^version' meshlet_preview/blender_manifest.toml \
                    | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
              tag="v$ver"
            fi
            echo "tag=$tag" >> "$GITHUB_OUTPUT"
          fi

      # Runs for tag pushes and for manual runs; on a manual run the tag is
      # created at the current commit if it does not already exist.
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.rel.outputs.tag }}
          files: dist/*.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
